<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kho File</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}
#vault{
    display:none;
}
.file{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
}
button{
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Kho File</h1>

<div id="login">
    <input id="pass" type="password" placeholder="Nhập mã">
    <button onclick="unlock()">Mở Kho</button>
</div>

<div id="vault">
    <input type="file" id="fileInput">
    <h3>Lịch sử</h3>
    <div id="list"></div>
</div>

<script>
const PASSWORD = "140613";

function unlock(){
    if(document.getElementById("pass").value===PASSWORD){
        document.getElementById("login").style.display="none";
        document.getElementById("vault").style.display="block";
        loadFiles();
    }else{
        alert("Sai mã");
    }
}

document.getElementById("fileInput").addEventListener("change",e=>{
    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(){
        let files=JSON.parse(localStorage.getItem("vaultFiles")||"[]");

        files.push({
            name:file.name,
            type:file.type,
            data:reader.result,
            time:new Date().toLocaleString()
        });

        localStorage.setItem(
            "vaultFiles",
            JSON.stringify(files)
        );

        loadFiles();
    };

    reader.readAsDataURL(file);
});

function loadFiles(){
    const list=document.getElementById("list");
    list.innerHTML="";

    let files=JSON.parse(localStorage.getItem("vaultFiles")||"[]");

    files.forEach((f,i)=>{
        const div=document.createElement("div");
        div.className="file";

        div.innerHTML=`
            <b>${f.name}</b><br>
            ${f.time}<br>
            <button onclick="downloadFile(${i})">
                Tải về
            </button>
        `;

        list.appendChild(div);
    });
}

function downloadFile(index){
    const files=JSON.parse(localStorage.getItem("vaultFiles")||"[]");
    const f=files[index];

    const a=document.createElement("a");
    a.href=f.data;
    a.download=f.name;
    a.click();
}
</script>

</body>
</html>
